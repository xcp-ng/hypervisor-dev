name: Python Requirements Check
description: 'Regenerate requirements files and verify no drift from what is committed'
inputs:
  working-directory:
    description: 'Directory containing the Python project to check'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: ./.github/actions/uv-setup/
      with:
        dev: false
        working-directory: ${{ inputs.working-directory }}
    - run: ${{ github.workspace }}/scripts/update_requirements.py
      shell: bash
      working-directory: ${{ inputs.working-directory }}
    - run: git diff --exit-code
      shell: bash
