name: Static code checkers - git-review-rebase

on:
  push:
    branches:
      - 'main'
    paths:
      - 'scripts/git-review-rebase/**'
  pull_request:
    paths:
      - 'scripts/git-review-rebase/**'

permissions: {}

jobs:
  git-review-rebase-code-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/python-code-check/
        with:
          working-directory: scripts/git-review-rebase
