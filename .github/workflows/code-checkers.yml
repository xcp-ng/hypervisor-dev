name: Static code checkers

on:
  push:
    branches:
      - 'main'
    paths:
      - 'scripts/git-review-rebase/**'
  pull_request:
    paths:
      - 'scripts/git-review-rebase/**'

permissions: {}

jobs:
  git-review-rebase-code-check:
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    defaults:
      run:
        working-directory: ./scripts/git-review-rebase
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/uv-setup/
        with:
          dev: true
          working-directory: scripts/git-review-rebase
      - run: mypy --install-types --non-interactive .
      - run: pyright
      - run: ruff check
      - run: flake8
