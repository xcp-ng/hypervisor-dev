name: Create a release from tag

permissions: {}

on:
  push:
    tags:
      - 'git-review-rebase-*'

jobs:
  build-git-review-rebase:
    name: Build and store python artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./scripts/git-review-rebase/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/uv-setup/
        with:
          working-directory: ./scripts/git-review-rebase/
      - name: Build
        run: uv build

      - name: Store python distribution artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: git-review-rebase-artifacts

  release-git-review-rebase:
    permissions:
      contents: write # allow creating a release

    name: "Create and package a git-review-rebase release"
    runs-on: ubuntu-latest
    needs: [build-git-review-rebase]
    defaults:
      run:
        working-directory: ./scripts/git-review-rebase/
    steps:
      - name: Retrieve distribution artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: git-review-rebase-artifacts

      - name: Create release ${{ github.ref_name }}
        shell: bash
        run: |
          gh release create ${GITHUB_REF_NAME} --repo ${{ github.repository }} --generate-notes ./scripts/git-review-rebase/dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
