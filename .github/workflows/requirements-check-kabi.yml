name: Check requirements file consistency - kabi

on:
  push:
    branches:
      - 'main'
    paths:
      - 'scripts/kabi/**'
      - 'scripts/update_requirements.py'
  pull_request:
    paths:
      - 'scripts/kabi/**'
      - 'scripts/update_requirements.py'

permissions: {}

jobs:
  requirements-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/python-requirements-check/
        with:
          working-directory: scripts/kabi
