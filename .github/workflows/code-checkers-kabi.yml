name: Static code checkers - kabi

on:
  push:
    branches:
      - 'main'
    paths:
      - 'scripts/kabi/**'
  pull_request:
    paths:
      - 'scripts/kabi/**'

permissions: {}

jobs:
  kabi-code-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/python-code-check/
        with:
          working-directory: scripts/kabi
