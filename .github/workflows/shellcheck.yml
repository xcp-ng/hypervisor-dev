name: shellcheck

on:
  push:
    branches:
      - 'main'
    paths:
      - 'scripts/*.sh'
      - 'scripts/git-import-srpm'
      - 'docker/riscv/**/*.sh'
  pull_request:
    paths:
      - 'scripts/*.sh'
      - 'scripts/git-import-srpm'
      - 'docker/riscv/**/*.sh'

permissions: {}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run shellcheck
        run: shellcheck scripts/*.sh scripts/git-import-srpm
